apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  timeout: 20m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 83.6.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    grafana:
      admin:
        existingSecret: grafana-admin-credentials
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: true
        existingClaim: kube-prometheus-stack-grafana
        storageClassName: longhorn
        size: 2Gi
      readinessProbe:
        httpGet:
          path: /api/health
          port: grafana
        initialDelaySeconds: 90
        periodSeconds: 10
        timeoutSeconds: 30
        failureThreshold: 30
      livenessProbe:
        httpGet:
          path: /api/health
          port: grafana
        initialDelaySeconds: 180
        periodSeconds: 10
        timeoutSeconds: 30
        failureThreshold: 30
      service:
        type: ClusterIP

    prometheus:
      prometheusSpec:
        retention: 7d
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorNamespaceSelector: {}
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi

    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 2Gi
