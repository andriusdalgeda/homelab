apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: velero-cloud-credentials
  namespace: velero
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: azure
    kind: ClusterSecretStore

  target:
    name: cloud-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        cloud: |
          AZURE_SUBSCRIPTION_ID={{ .SUBSCRIPTION_ID }}
          AZURE_TENANT_ID={{ .TENANT_ID }}
          AZURE_CLIENT_ID={{ .CLIENT_ID }}
          AZURE_CLIENT_SECRET={{ .CLIENT_SECRET }}
          AZURE_RESOURCE_GROUP={{ .BACKUP_RESOURCE_GROUP }}
          AZURE_CLOUD_NAME=AzurePublicCloud

  data:
    - secretKey: SUBSCRIPTION_ID
      remoteRef:
        key: SUBSCRIPTION-ID

    - secretKey: TENANT_ID
      remoteRef:
        key: TENANT-ID

    - secretKey: CLIENT_ID
      remoteRef:
        key: VELERO-CLIENT-ID

    - secretKey: CLIENT_SECRET
      remoteRef:
        key: VELERO-CLIENT-SECRET

    - secretKey: BACKUP_RESOURCE_GROUP
      remoteRef:
        key: VELERO-BACKUP-RESOURCE-GROUP
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: velero-helm-values
  namespace: velero
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: azure
    kind: ClusterSecretStore

  target:
    name: velero-helm-values
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        values.yaml: |
          initContainers:
            - name: velero-plugin-for-microsoft-azure
              image: velero/velero-plugin-for-microsoft-azure:v1.14.0
              imagePullPolicy: IfNotPresent
              volumeMounts:
                - mountPath: /target
                  name: plugins

          configuration:
            backupStorageLocation:
              - name: default
                provider: azure
                bucket: "{{ .BLOB_CONTAINER }}"
                default: true
                credential:
                  name: cloud-credentials
                  key: cloud
                config:
                  resourceGroup: "{{ .BACKUP_RESOURCE_GROUP }}"
                  storageAccount: "{{ .STORAGE_ACCOUNT }}"
                  subscriptionId: "{{ .SUBSCRIPTION_ID }}"
                  useAAD: "true"
            defaultVolumesToFsBackup: true

          credentials:
            useSecret: true
            existingSecret: cloud-credentials

          backupsEnabled: true
          snapshotsEnabled: false
          deployNodeAgent: true

          nodeAgent:
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi

          schedules:
            six-hour-pvc-backup:
              disabled: false
              schedule: "0 */6 * * *"
              template:
                ttl: 12h
                storageLocation: default
                includedNamespaces:
                  - obsidian
                  - uptime-kuma
                  - prowlarr
                  - seerr
                defaultVolumesToFsBackup: true

  data:
    - secretKey: SUBSCRIPTION_ID
      remoteRef:
        key: SUBSCRIPTION-ID

    - secretKey: BACKUP_RESOURCE_GROUP
      remoteRef:
        key: VELERO-BACKUP-RESOURCE-GROUP

    - secretKey: STORAGE_ACCOUNT
      remoteRef:
        key: VELERO-STORAGE-ACCOUNT

    - secretKey: BLOB_CONTAINER
      remoteRef:
        key: VELERO-BLOB-CONTAINER
