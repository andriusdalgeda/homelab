apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: azdo-agent
  namespace: azdo-agent
spec:
  secretTargetRef:
    - parameter: organizationURL
      name: azdo-agent-credentials
      key: AZP-URL
    - parameter: personalAccessToken
      name: azdo-agent-credentials
      key: AZP-TOKEN
