apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: azdo-agent
  namespace: azdo-agent
spec:
  scaleTargetRef:
    name: azdo-agent
    envSourceContainerName: azdo-agent
  maxReplicaCount: 5
  pollingInterval: 10
  triggers:
    - type: azure-pipelines
      metadata:
        poolID: "9"
        targetPipelinesQueueLength: "0"
      authenticationRef:
        name: azdo-agent
