apiVersion: batch/v1
kind: CronJob
metadata:
  name: azdo-agent-health
  namespace: azdo-agent
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          dnsPolicy: None
          dnsConfig:
            nameservers:
              - 1.1.1.1
              - 8.8.8.8
          restartPolicy: Never
          containers:
            - name: check
              image: curlimages/curl:8.10.1
              imagePullPolicy: IfNotPresent
              env:
                - name: KUMA_PUSH_URL
                  valueFrom:
                    secretKeyRef:
                      name: azdo-agent-monitoring
                      key: UPTIME-KUMA-AZDO-PUSH-URL
              command:
                - /bin/sh
                - -ec
                - |
                  : "${KUMA_PUSH_URL:?KUMA_PUSH_URL is empty or missing}"

                  echo "Pushing to Uptime Kuma"
                  curl -fsv -o /dev/null $KUMA_PUSH_URL
