apiVersion: batch/v1
kind: CronJob
metadata:
  name: azdo-agent-health
  namespace: azdo-agent
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          dnsPolicy: None
          dnsConfig:
            nameservers:
              - 1.1.1.1
              - 8.8.8.8
          restartPolicy: Never
          containers:
            - name: check
              image: curlimages/curl:8.10.1
              imagePullPolicy: IfNotPresent
              env:
                - name: AZP_URL
                  valueFrom:
                    secretKeyRef:
                      name: azdo-agent-credentials
                      key: AZP-URL
                - name: AZP_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: azdo-agent-credentials
                      key: AZP-TOKEN
                - name: AZP_POOL
                  valueFrom:
                    secretKeyRef:
                      name: azdo-agent-credentials
                      key: AZP-POOL
                - name: KUMA_PUSH_URL
                  valueFrom:
                    secretKeyRef:
                      name: azdo-agent-monitoring
                      key: UPTIME-KUMA-AZDO-PUSH-URL
                - name: MIN_ONLINE_AGENTS
                  value: "1"
              command:
                - /bin/sh
                - -ec
                - |
                  : "${AZP_URL:?AZP_URL is empty or missing}"
                  : "${AZP_TOKEN:?AZP_TOKEN is empty or missing}"
                  : "${AZP_POOL:?AZP_POOL is empty or missing}"
                  : "${KUMA_PUSH_URL:?KUMA_PUSH_URL is empty or missing}"
                  : "${MIN_ONLINE_AGENTS:?MIN_ONLINE_AGENTS is empty or missing}"

                  azp_url="${AZP_URL%/}"
                  case "$azp_url" in
                    https://dev.azure.com/*)
                      organization="$(printf '%s' "$azp_url" | cut -d/ -f4)"
                      ;;
                    *)
                      echo "AZP_URL must look like https://dev.azure.com/<organization>, got: $AZP_URL"
                      exit 1
                      ;;
                  esac

                  if [ -z "$organization" ]; then
                    echo "Could not determine Azure DevOps organization from AZP_URL: $AZP_URL"
                    exit 1
                  fi

                  organization_url="https://dev.azure.com/$organization"

                  echo "Looking up Azure DevOps pool '$AZP_POOL' in organization '$organization'"
                  pool_json="$(
                    curl -fsS -u ":$AZP_TOKEN" \
                      -G "$organization_url/_apis/distributedtask/pools" \
                      -H "Accept: application/json" \
                      --data-urlencode "poolName=$AZP_POOL" \
                      --data-urlencode "api-version=7.1"
                  )"
                  pool_id="$(
                    printf '%s' "$pool_json" \
                      | grep -o '"id"[[:space:]]*:[[:space:]]*[0-9]*' \
                      | head -1 \
                      | grep -o '[0-9]*' \
                      || true
                  )"

                  if [ -z "$pool_id" ]; then
                    echo "Azure DevOps pool not found: $AZP_POOL"
                    exit 1
                  fi

                  echo "Checking Azure DevOps agents in pool ID: $pool_id"
                  agents_json="$(
                    curl -fsS -u ":$AZP_TOKEN" \
                      -H "Accept: application/json" \
                      "$organization_url/_apis/distributedtask/pools/$pool_id/agents?api-version=7.1"
                  )"
                  online_agents="$(printf '%s' "$agents_json" | grep -o '"status"[[:space:]]*:[[:space:]]*"online"' | wc -l | tr -d ' ')"

                  if [ "$online_agents" -lt "$MIN_ONLINE_AGENTS" ]; then
                    echo "Online Azure DevOps agents below threshold: $online_agents of $MIN_ONLINE_AGENTS"
                    exit 1
                  fi

                  echo "Online Azure DevOps agents: $online_agents"
                  echo "Pushing to Uptime Kuma"
                  curl -fsS "$KUMA_PUSH_URL"
