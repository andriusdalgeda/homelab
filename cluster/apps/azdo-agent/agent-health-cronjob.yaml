apiVersion: batch/v1
kind: CronJob
metadata:
  name: azdo-agent-health
  namespace: azdo-agent
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: check
              image: bash:5.2-alpine3.20
              imagePullPolicy: IfNotPresent
              env:
                - name: AZP_URL
                  valueFrom:
                    secretKeyRef:
                      name: azdo-agent-credentials
                      key: AZP-URL
                - name: AZP_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: azdo-agent-credentials
                      key: AZP-TOKEN
                - name: AZP_POOL
                  valueFrom:
                    secretKeyRef:
                      name: azdo-agent-credentials
                      key: AZP-POOL
                - name: KUMA_PUSH_URL
                  valueFrom:
                    secretKeyRef:
                      name: azdo-agent-monitoring
                      key: KUMA-PUSH-URL
                - name: MIN_ONLINE_AGENTS
                  value: "2"
              command:
                - /bin/bash
                - -ec
                - |
                  apk add --no-cache curl jq >/dev/null

                  : "${AZP_URL:?AZP_URL is empty or missing}"
                  : "${AZP_TOKEN:?AZP_TOKEN is empty or missing}"
                  : "${AZP_POOL:?AZP_POOL is empty or missing}"
                  : "${KUMA_PUSH_URL:?KUMA_PUSH_URL is empty or missing}"

                  azp_url="${AZP_URL%/}"
                  if [[ "$azp_url" != http://* && "$azp_url" != https://* ]]; then
                    echo "AZP_URL must start with http:// or https://, got: $azp_url"
                    exit 1
                  fi

                  auth_header="Authorization: Basic $(printf ':%s' "$AZP_TOKEN" | base64 | tr -d '\n')"
                  encoded_pool="$(jq -rn --arg pool "$AZP_POOL" '$pool|@uri')"

                  echo "Looking up Azure DevOps pool: $AZP_POOL"
                  pool_id="$(
                    curl -fsS \
                      -H "$auth_header" \
                      -H "Accept: application/json" \
                      "$azp_url/_apis/distributedtask/pools?poolName=$encoded_pool&api-version=7.1" \
                      | jq -r '.value[0].id // empty'
                  )"

                  if [[ -z "$pool_id" ]]; then
                    echo "Pool not found: $AZP_POOL"
                    exit 1
                  fi

                  echo "Checking agents in pool ID: $pool_id"
                  agents_json="$(
                    curl -fsS \
                      -H "$auth_header" \
                      -H "Accept: application/json" \
                      "$azp_url/_apis/distributedtask/pools/$pool_id/agents?includeAssignedRequest=true&api-version=7.1"
                  )"

                  total="$(jq '.value | length' <<< "$agents_json")"
                  online="$(jq '[.value[] | select(.enabled == true and .status == "online")] | length' <<< "$agents_json")"

                  if (( online < MIN_ONLINE_AGENTS )); then
                    echo "Online agents below threshold: $online of $total"
                    exit 1
                  fi

                  echo "Online agents: $online of $total"
                  echo "Pushing to Uptime Kuma"
                  curl -fsS "$KUMA_PUSH_URL"
