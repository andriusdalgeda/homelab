apiVersion: batch/v1
kind: CronJob
metadata:
  name: azdo-agent-health
  namespace: azdo-agent
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          dnsPolicy: None
          dnsConfig:
            nameservers:
              - 1.1.1.1
              - 8.8.8.8
          restartPolicy: Never
          containers:
            - name: check
              image: curlimages/curl:8.10.1
              imagePullPolicy: IfNotPresent
              env:
                - name: AZP_URL
                  valueFrom:
                    secretKeyRef:
                      name: azdo-agent-credentials
                      key: AZP-URL
                - name: AZP_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: azdo-agent-credentials
                      key: AZP-TOKEN
                - name: AZP_POOL
                  valueFrom:
                    secretKeyRef:
                      name: azdo-agent-credentials
                      key: AZP-POOL
                - name: KUMA_PUSH_URL
                  valueFrom:
                    secretKeyRef:
                      name: azdo-agent-monitoring
                      key: UPTIME-KUMA-AZDO-PUSH-URL
                - name: MIN_ONLINE_AGENTS
                  value: "1"
              command:
                - /bin/sh
                - -ec
                - |
                  azp_url="$(printf '%s' "$AZP_URL" | sed 's#/*$##')"
                  organization="$(printf '%s' "$azp_url" | cut -d/ -f4)"
                  organization_url="https://dev.azure.com/$organization"

                  pool_json="$(
                    curl -fsS -u ":$AZP_TOKEN" \
                      -G "$organization_url/_apis/distributedtask/pools" \
                      --data-urlencode "poolName=$AZP_POOL" \
                      --data-urlencode "api-version=7.1"
                  )"
                  pool_id="$(printf '%s' "$pool_json" | grep -o '"id"[[:space:]]*:[[:space:]]*[0-9]*' | head -1 | grep -o '[0-9]*' || true)"

                  if [ -z "$pool_id" ]; then
                    echo "Azure DevOps pool not found: $AZP_POOL"
                    exit 1
                  fi

                  agents_json="$(
                    curl -fsS -u ":$AZP_TOKEN" \
                      "$organization_url/_apis/distributedtask/pools/$pool_id/agents?api-version=7.1"
                  )"
                  online_agents="$(printf '%s' "$agents_json" | grep -o '"status"[[:space:]]*:[[:space:]]*"online"' | wc -l | tr -d ' ')"

                  if [ "$online_agents" -lt "$MIN_ONLINE_AGENTS" ]; then
                    echo "Online Azure DevOps agents below threshold: $online_agents of $MIN_ONLINE_AGENTS"
                    exit 1
                  fi

                  echo "Online Azure DevOps agents: $online_agents"
                  curl -fsS "$KUMA_PUSH_URL"
