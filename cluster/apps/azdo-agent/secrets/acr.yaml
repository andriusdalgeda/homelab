apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: acr-pull
  namespace: azdo-agent
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: azure
    kind: ClusterSecretStore

  target:
    name: acr-pull-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "username": "{{ index . "username" }}",
                "password": "{{ index . "password" }}",
                "auth": "{{ printf "%s:%s" (index . "username") (index . "password") | b64enc }}"
              }
            }
          }

  data:
    - secretKey: username
      remoteRef:
        key: DOCKERHUB-USERNAME

    - secretKey: password
      remoteRef:
        key: DOCKERHUB-TOKEN
