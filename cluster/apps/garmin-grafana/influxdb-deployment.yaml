apiVersion: apps/v1
kind: Deployment
metadata:
  name: garmin-grafana-influxdb
  namespace: garmin-grafana
  labels:
    app.kubernetes.io/name: garmin-grafana-influxdb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: garmin-grafana-influxdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garmin-grafana-influxdb
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: influxdb
          image: influxdb:1.11
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 8086
          envFrom:
            - secretRef:
                name: garmin-grafana-credentials
          env:
            - name: INFLUXDB_DB
              value: GarminStats
            - name: INFLUXDB_HTTP_AUTH_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /ping
              port: http
          livenessProbe:
            httpGet:
              path: /ping
              port: http
          volumeMounts:
            - name: data
              mountPath: /var/lib/influxdb
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: garmin-grafana-influxdb
