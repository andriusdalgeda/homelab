apiVersion: batch/v1
kind: CronJob
metadata:
  name: obsidian-git-restore
  namespace: obsidian
spec:
  schedule: "0 0 31 2 *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: restore
              image: bitnami/git:latest
              env:
                - name: GIT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: git-credentials
                      key: GIT_TOKEN
              command:
                - /bin/bash
                - -c
                - |
                  set -e

                  echo "Cloning repo..."
                  git clone https://$GIT_TOKEN@github.com/andriusdalgeda/obsidian.git /repo

                  echo "Preparing vault..."
                  mkdir -p /data/obsidian
                  rm -rf /data/obsidian/*

                  echo "Restoring..."
                  cp -a /repo/. /data/obsidian/

                  echo "Fixing permissions..."
                  chown -R 1000:1000 /data
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: obsidian-config