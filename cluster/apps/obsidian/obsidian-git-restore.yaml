apiVersion: batch/v1
kind: Job
metadata:
  name: obsidian-git-restore
  namespace: obsidian
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: restore
          image: alpine:3.19
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: git-credentials
                  key: GIT_TOKEN
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Installing dependencies..."
              apk add --no-cache git rsync

              echo "Cloning repo..."
              git clone https://$GIT_TOKEN@github.com/andriusdalgeda/obsidian.git /repo

              echo "Preparing vault directory..."
              mkdir -p /data/obsidian

              echo "Clearing existing vault..."
              rm -rf /data/obsidian/*

              echo "Restoring vault..."
              rsync -a /repo/ /data/obsidian/

              echo "Fixing permissions..."
              chown -R 1000:1000 /data

              echo "Restore complete"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: obsidian-config