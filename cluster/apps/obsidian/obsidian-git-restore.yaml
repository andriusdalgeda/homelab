apiVersion: batch/v1
kind: CronJob
metadata:
  name: obsidian-git-restore
  namespace: obsidian
spec:
  schedule: "0 0 31 2 *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: restore
              image: bitnami/git:latest
              env:
                - name: GIT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: git-credentials
                      key: GIT-TOKEN
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  export GIT_TERMINAL_PROMPT=0

                  if [ -z "$GIT_TOKEN" ]; then
                    echo "GIT_TOKEN is required"
                    exit 1
                  fi

                  GIT_TOKEN="$(printf '%s' "$GIT_TOKEN" | tr -d '\r\n')"
                  token_length="$(printf '%s' "$GIT_TOKEN" | wc -c | tr -d ' ')"
                  echo "Git token length: $token_length"

                  repo_url="https://github.com/andriusdalgeda/obsidian.git"
                  auth_header="$(printf 'x-access-token:%s' "$GIT_TOKEN" | base64 | tr -d '\n')"

                  echo "Cloning repo..."
                  git -c "http.https://github.com/.extraheader=Authorization: Basic $auth_header" \
                    clone "$repo_url" /repo

                  echo "Preparing vault..."
                  mkdir -p /data/obsidian
                  rm -rf /data/obsidian/*

                  echo "Restoring..."
                  cp -a /repo/. /data/obsidian/

                  echo "Fixing permissions..."
                  chown -R 1000:1000 /data
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: obsidian-config
