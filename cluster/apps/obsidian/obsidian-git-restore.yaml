apiVersion: batch/v1
kind: CronJob
metadata:
  name: obsidian-git-restore
  namespace: obsidian
spec:
  schedule: "0 0 31 2 *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: restore
              image: alpine:3.19
              env:
                - name: GIT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: git-credentials
                      key: GIT_TOKEN
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache git rsync
                  git clone https://$GIT_TOKEN@github.com/andriusdalgeda/obsidian.git /repo
                  mkdir -p /data/obsidian
                  rm -rf /data/obsidian/*
                  rsync -a /repo/ /data/obsidian/
                  chown -R 1000:1000 /data
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: obsidian-config