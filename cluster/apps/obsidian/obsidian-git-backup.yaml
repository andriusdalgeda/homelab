apiVersion: batch/v1
kind: CronJob
metadata:
  name: obsidian-git-backup
  namespace: obsidian
spec:
  schedule: "0 */4 * * *"
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: bitnami/git:latest
              env:
                - name: GIT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: git-credentials
                      key: GIT-TOKEN
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  export GIT_TERMINAL_PROMPT=0

                  if [ -z "$GIT_TOKEN" ]; then
                    echo "GIT_TOKEN is required"
                    exit 1
                  fi

                  GIT_TOKEN="$(printf '%s' "$GIT_TOKEN" | tr -d '\r\n')"
                  token_length="$(printf '%s' "$GIT_TOKEN" | wc -c | tr -d ' ')"
                  echo "Git token length: $token_length"

                  repo_url="https://github.com/andriusdalgeda/obsidian.git"
                  auth_header="$(printf 'x-access-token:%s' "$GIT_TOKEN" | base64 | tr -d '\n')"

                  echo "Cloning repo..."
                  git -c "http.https://github.com/.extraheader=Authorization: Basic $auth_header" \
                    clone --depth=1 "$repo_url" /repo

                  cd /repo
                  git remote set-url origin "$repo_url"

                  echo "Fixing git safety..."
                  git config --global --add safe.directory /repo

                  echo "Configuring git..."
                  git config --global user.name "obsidian-backup"
                  git config --global user.email "backup@local"

                  echo "Ensuring vault path exists..."
                  mkdir -p /data/obsidian

                  echo "Syncing vault..."
                  find /repo -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
                  cp -a /data/obsidian/. /repo/

                  echo "Staging changes..."
                  git add .

                  if git diff --cached --quiet; then
                    echo "No changes detected"
                    exit 0
                  fi

                  echo "Committing..."
                  git commit -m "Backup $(date +%F-%T)"

                  echo "Pushing..."
                  git -c "http.https://github.com/.extraheader=Authorization: Basic $auth_header" \
                    pull --rebase -X ours origin main || true
                  git -c "http.https://github.com/.extraheader=Authorization: Basic $auth_header" \
                    push origin main

                  echo "Backup complete"
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: obsidian-config
