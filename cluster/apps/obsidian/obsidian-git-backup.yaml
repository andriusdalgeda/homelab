apiVersion: batch/v1
kind: CronJob
metadata:
  name: obsidian-git-backup
  namespace: obsidian
spec:
  schedule: "0 * * * *"   # hourly
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: alpine:3.19
              env:
                - name: GIT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: git-credentials
                      key: GIT_TOKEN
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  echo "Installing dependencies..."
                  apk add --no-cache git rsync

                  echo "Cloning repo..."
                  git clone https://$GIT_TOKEN@github.com/andriusdalgeda/obsidian.git /repo

                  cd /repo

                  echo "Configuring git..."
                  git config user.name "obsidian-backup"
                  git config user.email "backup@local"

                  echo "Ensuring vault path exists..."
                  mkdir -p /data/obsidian

                  echo "Syncing vault only..."
                  rsync -a --delete \
                    --exclude='.cache' \
                    --exclude='.config' \
                    --exclude='.local' \
                    --exclude='.dbus' \
                    --exclude='.pki' \
                    --exclude='Desktop' \
                    --exclude='ssl' \
                    --exclude='.XDG' \
                    /data/obsidian/ /repo/

                  echo "Staging changes..."
                  git add .

                  if git diff --cached --quiet; then
                    echo "No changes detected"
                    exit 0
                  fi

                  echo "Committing..."
                  git commit -m "Backup $(date +%F-%T)"

                  echo "Pushing..."
                  git push origin main

                  echo "Backup complete"
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: obsidian-config