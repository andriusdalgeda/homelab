apiVersion: batch/v1
kind: CronJob
metadata:
  name: obsidian-git-backup
  namespace: obsidian
spec:
  schedule: "0 */4 * * *"
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: bitnami/git:latest
              env:
                - name: GIT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: git-credentials
                      key: GIT-TOKEN
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  export GIT_TERMINAL_PROMPT=0

                  repo_url="https://x-access-token:"$GIT_TOKEN"@github.com/andriusdalgeda/obsidian.git"

                  echo "Cloning repo..."
                  git clone --depth=1 "$repo_url" /repo

                  cd /repo

                  echo "Fixing git safety..."
                  git config --global --add safe.directory /repo

                  echo "Configuring git..."
                  git config --global user.name "obsidian-backup"
                  git config --global user.email "backup@local"

                  echo "Ensuring vault path exists..."
                  mkdir -p /data/obsidian

                  echo "Syncing vault..."
                  find /repo -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
                  cp -a /data/obsidian/. /repo/

                  echo "Staging changes..."
                  git add .

                  if git diff --cached --quiet; then
                    echo "No changes detected"
                    exit 0
                  fi

                  echo "Committing..."
                  git commit -m "Backup $(date +%F-%T)"

                  echo "Pushing..."
                  git pull --rebase -X ours origin main || true
                  git push origin main

                  echo "Backup complete"
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: obsidian-config
