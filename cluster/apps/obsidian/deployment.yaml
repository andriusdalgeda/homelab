apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian
  namespace: obsidian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obsidian
  template:
    metadata:
      labels:
        app: obsidian
    spec:
      containers:
        - name: obsidian
          image: lscr.io/linuxserver/obsidian:latest
          ports:
            - containerPort: 3000
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: shm
              mountPath: /dev/shm
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "1Gi"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: obsidian-config
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi