apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: git-credentials
  namespace: cloudflared
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: azure
    kind: SecretStore

  target:
    name: cloudflared-secret
    creationPolicy: Owner

  data:
    - secretKey: TUNNEL-TOKEN
      remoteRef:
        key: TUNNEL-TOKEN