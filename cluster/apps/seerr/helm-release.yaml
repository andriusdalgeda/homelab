apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
  namespace: seerr
spec:
  interval: 10m
  chart:
    spec:
      chart: seerr-chart
      version: 3.4.2
      sourceRef:
        kind: HelmRepository
        name: seerr
        namespace: flux-system
  install:
    createNamespace: true
  values:
    fullnameOverride: seerr
    service:
      type: ClusterIP
      port: 3500
    config:
      persistence:
        storageClass: longhorn
        size: 5Gi
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
              name: seerr
            patch: |
              - op: add
                path: /spec/template/spec/dnsPolicy
                value: None
              - op: add
                path: /spec/template/spec/dnsConfig
                value:
                  nameservers:
                    - 1.1.1.1
                    - 8.8.8.8
