apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
  namespace: paperless
spec:
  interval: 10m
  chart:
    spec:
      chart: paperless-ngx
      version: 0.3.19
      sourceRef:
        kind: HelmRepository
        name: paperless
        namespace: flux-system
  install:
    createNamespace: true
  values:
    fullnameOverride: paperless
    config:
      url: https://paperless.andriusdalgeda.com
    env:
      TZ: UTC
    service:
      port: 8888
    persistence:
      enabled: true
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 15Gi
    postgresql:
      primary:
        persistence:
          storageClass: longhorn
          size: 8Gi
    valkey:
      dataStorage:
        className: longhorn
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: paperless
            patch: |
              - op: add
                path: /spec/template/spec/enableServiceLinks
                value: false
