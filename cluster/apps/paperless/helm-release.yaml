apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
  namespace: paperless
spec:
  interval: 10m
  chart:
    spec:
      chart: paperless-ngx
      version: 0.24.1
      sourceRef:
        kind: HelmRepository
        name: paperless
        namespace: flux-system
  install:
    createNamespace: true
  values:
    fullnameOverride: paperless
    env:
      TZ: UTC
      PAPERLESS_URL: https://paperless.andriusdalgeda.com
    service:
      main:
        ports:
          http:
            port: 8888
    persistence:
      data:
        enabled: true
        mountPath: /usr/src/paperless/data
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
      media:
        enabled: true
        mountPath: /usr/src/paperless/media
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
      export:
        enabled: true
        mountPath: /usr/src/paperless/export
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 1Gi
      consume:
        enabled: true
        mountPath: /usr/src/paperless/consume
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 4Gi
