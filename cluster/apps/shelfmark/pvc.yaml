apiVersion: v1
kind: PersistentVolume
metadata:
  name: shelfmark-shared-downloads
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: longhorn-rwx
  csi:
    driver: driver.longhorn.io
    fsType: ext4
    volumeHandle: shelfmark-shared-downloads
    volumeAttributes:
      numberOfReplicas: "1"
      staleReplicaTimeout: "30"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shelfmark-config
  namespace: shelfmark
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shelfmark-books
  namespace: shelfmark
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shelfmark-shared-downloads
  namespace: shelfmark
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: longhorn-rwx
  volumeName: shelfmark-shared-downloads
  resources:
    requests:
      storage: 20Gi
