apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stirling-pdf
  namespace: stirling-pdf
spec:
  interval: 10m
  chart:
    spec:
      chart: stirling-pdf-chart
      version: 2.2.0
      sourceRef:
        kind: HelmRepository
        name: stirling-pdf
        namespace: flux-system
  install:
    createNamespace: true
  values:
    service:
      type: ClusterIP
      servicename: stirling-pdf
    persistence:
      enabled: false
    envs:
      - name: TZ
        value: Europe/London
