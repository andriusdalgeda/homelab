apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      dnsPolicy: ClusterFirst
      dnsConfig:
        nameservers:
          - 10.96.0.10
          - 1.1.1.1
          - 8.8.8.8
      containers:
        - name: n8n
          image: docker.n8n.io/n8nio/n8n:2.26.8
          ports:
            - containerPort: 5678
          envFrom:
            - secretRef:
                name: n8n-credentials
          env:
            - name: GENERIC_TIMEZONE
              value: Europe/London
            - name: TZ
              value: Europe/London
            - name: N8N_HOST
              value: n8n.taile6b0e8.ts.net
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: https
            - name: WEBHOOK_URL
              value: https://n8n.taile6b0e8.ts.net/
            - name: N8N_PROXY_HOPS
              value: "1"
            - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
              value: "true"
            - name: N8N_RUNNERS_ENABLED
              value: "true"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n
