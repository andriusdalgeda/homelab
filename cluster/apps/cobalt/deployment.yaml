apiVersion: apps/v1
kind: Deployment
metadata:
  name: cobalt
  namespace: cobalt
  labels:
    app: cobalt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cobalt
  template:
    metadata:
      labels:
        app: cobalt
    spec:
      containers:
        - name: cobalt
          image: ghcr.io/imputnet/cobalt:11
          ports:
            - containerPort: 9000
          env:
            - name: API_URL
              value: "https://cobalt.andriusdalgeda.com/"
            - name: API_PORT
              value: "9000"
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /app/config
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          emptyDir: {}
      restartPolicy: Always
