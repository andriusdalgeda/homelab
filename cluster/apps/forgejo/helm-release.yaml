apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 10m
  chart:
    spec:
      chart: forgejo
      version: 16.0.2
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  install:
    createNamespace: true
  values:
    image:
      tag: "14"
    service:
      http:
        type: ClusterIP
        port: 5000
        clusterIP:
      ssh:
        type: ClusterIP
        port: 222
        clusterIP:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 10Gi
    gitea:
      config:
        server:
          HTTP_PORT: 5000
          SSH_PORT: 222
          DOMAIN: forgejo.andriusdalgeda.com
          ROOT_URL: http://forgejo.andriusdalgeda.com
          SSH_DOMAIN: forgejo.andriusdalgeda.com
