apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: velero-secrets
  namespace: flux-system
spec:
  interval: 5m
  path: ./cluster/infrastructure/velero/secrets
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: external-secrets-resources
  sourceRef:
    kind: GitRepository
    name: flux-system
