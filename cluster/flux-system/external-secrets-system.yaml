apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-system
  namespace: flux-system
spec:
  interval: 5m
  path: ./cluster/infrastructure/external-secrets
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: flux-system
