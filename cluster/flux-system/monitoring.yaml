apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
spec:
  interval: 5m
  path: ./cluster/infrastructure/monitoring
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: monitoring-secrets
    - name: longhorn
  sourceRef:
    kind: GitRepository
    name: flux-system
