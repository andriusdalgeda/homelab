apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-resources
  namespace: flux-system
spec:
  interval: 5m
  path: ./cluster/infrastructure/external-secrets-resources
  prune: true
  dependsOn:
    - name: external-secrets-system
  sourceRef:
    kind: GitRepository
    name: flux-system