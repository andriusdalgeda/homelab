apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-resources
  namespace: flux-system
spec:
  interval: 5m
  path: ./cluster/infrastructure/external-secrets-resources
  prune: true
  dependsOn:
    - name: cilium
    - name: external-secrets-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: azure-keyvault-config
  sourceRef:
    kind: GitRepository
    name: flux-system
